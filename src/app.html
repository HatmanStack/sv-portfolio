<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Preconnect to external font providers -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<!-- Preload critical fonts -->
		<link
			rel="preload"
			href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
			as="style"
		/>
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
			media="print"
			onload="this.media = 'all'"
		/>

		<!-- Body background lives here (not in app.css) so Vite's per-route CSS
		     shuffling on client navigation can never drop it. Reads the same tokens
		     and --bg-glow-* vars, with hard fallbacks so it holds regardless. -->
		<style>
			body {
				margin: 0;
				min-height: 100vh;
				background-attachment: fixed;
				background-color: var(--color-bg-layer-0, #483422);
				background-size: 100vw 100vh;
				background-image:
					/* bright centre glow (lightens the middle) */
					radial-gradient(
						var(--bg-glow-rx, 65%) var(--bg-glow-ry, 65%) at var(--bg-glow-x, 50%)
							var(--bg-glow-y, 50%),
						rgba(255, 255, 255, 0.75) 0%,
						rgba(255, 255, 255, 0) 100%
					),
					/* brown base */
					linear-gradient(
							180deg,
							var(--color-bg-layer-0, #483422) 0%,
							var(--color-bg-layer-2, #483422) 100%
						);
			}
		</style>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
